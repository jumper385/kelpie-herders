name: Export Godot Builds

on:
  workflow_dispatch:
  push:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: true

      - name: Verify Godot
        run: godot --version

      - name: Import project once
        run: |
          godot --headless --editor --quit

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/MyGame.exe

      - name: Export macOS
        run: |
          mkdir -p build/macos
          godot --headless --export-release "macOS" build/macos/MyGame.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-Windows
          path: build/windows/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-macOS
          path: build/macos/
