name: Export Godot Builds

on:
  workflow_dispatch:
  push:

# global game title
env:
  GAME_TITLE: kelpieherders

jobs:
  export-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: true

      - name: Verify Godot
        run: godot --version

      - name: Import project once
        run: |
          godot --headless --editor --quit

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/${{ env.GAME_TITLE }}.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_TITLE }}_windows
          path: build/windows/

  export-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: true

      - name: Verify Godot
        run: godot --version

      - name: Import project once
        run: |
          godot --headless --editor --quit

      - name: Export macOS
        run: |
          mkdir -p build/macos
          godot --headless --export-release "macOS" build/macos/${{ env.GAME_TITLE }}.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_TITLE }}_macos
          path: build/macos/
